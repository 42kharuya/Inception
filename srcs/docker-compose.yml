services:
  mariadb:
    container_name: mariadb
    image: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    # コンテナ起動時に、.envの内容が「環境変数」としてコンテナ
    env_file:
      - .env
    # コンテナ内の /run/secrets/<secret名> にファイルとしてマウントされる
    secrets:
      - db_root_password
      - db_password
    volumes:
      - DB:/var/lib/mysql
    networks:
      - inception_network
    # コンテナが停止したときに Docker が自動的に再起動を試みる
    restart: always
    healthcheck:
      # MariaDB が起動していて root 認証が通るかを確認するヘルスチェック。
      # - `mariadb-admin ping` はサーバに ping を打って応答があれば成功
      # - パスワードは Docker secret `/run/secrets/db_root_password` から読み取る
      # - `--silent` により余計な出力を抑える
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$(cat /run/secrets/db_root_password)\" --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  wordpress:
    container_name: wordpress
    image: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    volumes:
      - WordPress:/var/www/html
    networks:
      - inception_network
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      # CMD-SHELL: コマンドをシェル経由（典型的には /bin/sh -c）で実行する形式
      # WordPress コンテナが「PHP-FPM が待受していて、WP が初期化済み」かを確認するヘルスチェック。
      # - `nc -z 127.0.0.1 9000` で php-fpm(9000) のポートが開いているか確認
      # - `wp core is-installed` で WordPress がインストール済みか確認（初回起動のブートストラップ完了判定）
      test:
        [
          "CMD-SHELL",
          "nc -z 127.0.0.1 9000 && wp core is-installed --allow-root --path=/var/www/html",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  nginx:
    container_name: nginx
    image: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - WordPress:/var/www/html
    ports:
      - "443:443"
    networks:
      - inception_network
    restart: always
    depends_on:
      wordpress:
        condition: service_healthy

volumes:
  DB:
    name: DB
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/DB
  WordPress:
    name: WordPress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/WordPress

networks:
  inception_network:
    driver: bridge
    name: inception_network

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  credentials:
    file: ../secrets/credentials.txt